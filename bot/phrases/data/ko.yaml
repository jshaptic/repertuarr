styles:
  default:
    thinking:
    - 뭔가 좋은 걸 생각해볼게...
    - 음, 볼 만한 걸 찾아볼게...
    - 잠깐만 — 특별한 걸 골라볼게...
  casual:
    thinking:
    - 잠깐, 멋진 거 하나 파볼게...
    - 1초만 — 좋은 거 곧 나올 거야...
    - 알았어, 괜찮은 거 하나 찾아볼게...
  warm:
    thinking:
    - 정말 마음에 들 만한 걸 찾아볼게...
    - 편안하고 좋은 걸 골라줄게...
    - 잠깐만 — 정말 좋은 추천이 되게 할게...
  witty:
    thinking:
    - 아주 과학적인 취향 알고리즘에 문의 중...
    - 추천 주사위 굴리는 중 — 비유적으로...
    - 좋은 작품 금고를 뒤져볼게...
  cinephile:
    thinking:
    - 좋은 선반에서 숏리스트를 만들고 있어...
    - 카탈로그를 넘기며 볼 만한 걸 찾아볼게...
    - 잠깐만 — 더 괜찮은 후보 중에서 고를게...
  sarcastic:
    thinking:
    - 물론이죠, 모든 걸 내려놓고 완벽한 걸 찾아볼게요...
    - 당연히 할 일이 없었던 건 아니지만요...
    - 알겠어요. 재미있는 도전인 척할게요...
  wizarding:
    thinking:
    - 금서 구역에서 볼 만한 걸 찾는 중...
    - 기숙 배정 모자에게 취향을 물어보는 중...
    - 추천 물약을 만드는 중 — 거의 다 됐어요...
shared:
  recommend_button:
  - 뭔가 추천해줘
  download_ready:
  - 🎉 *{title}* 준비 완료\! [{play_label}]({url})
  download_ready_no_url:
  - 🎉 *{title}* 다운로드 완료!
  play_button:
  - ▶️ Jellyfin에서 시청
