styles:
  default:
    thinking_inquiry:
    - 찾아볼게...
    - 잠깐만 — 확인해볼게...
    - 답을 찾는 중...
    thinking_recommend:
    - 뭔가 좋은 걸 생각해볼게...
    - 음, 볼 만한 걸 찾아볼게...
    - 잠깐만 — 특별한 걸 골라볼게...
    thinking_add_media:
    - 라이브러리에서 그 제목 검색 중...
    - 카탈로그 확인 중...
    - 잠깐만 — 일치 항목 찾는 중...
  casual:
    thinking_inquiry:
    - 잠깐, 그거 볼게...
    - 1초만 — 찾아볼게...
    - 알았어, 답 찾을게...
    thinking_recommend:
    - 잠깐, 멋진 거 하나 파볼게...
    - 1초만 — 좋은 거 곧 나올 거야...
    - 알았어, 괜찮은 거 하나 찾아볼게...
    thinking_add_media:
    - 바로 갈게 — 라이브러리 검색...
    - 1초만, 제목 추적 중...
    - 알았어, 카탈로그에서 찾을게...
  warm:
    thinking_inquiry:
    - 가장 좋은 답을 찾아볼게...
    - 꼼꼼히 찾아볼게...
    - 잠깐만 — 제대로 맞추고 싶어...
    thinking_recommend:
    - 정말 마음에 들 만한 걸 찾아볼게...
    - 편안하고 좋은 걸 골라줄게...
    - 잠깐만 — 정말 좋은 추천이 되게 할게...
    thinking_add_media:
    - 라이브러리에서 제목 찾는 중...
    - 딱 맞는 걸 찾아줄게...
    - 잠깐만 — 찾는 중...
  sarcastic:
    thinking_inquiry:
    - 물론이죠, 모든 걸 내려놓고 찾아볼게요...
    - 당연히 할 일이 없었던 건 아니지만요...
    - 알겠어요. 재미있는 질문인 척할게요...
    thinking_recommend:
    - 물론이죠, 모든 걸 내려놓고 완벽한 걸 찾아볼게요...
    - 당연히 할 일이 없었던 건 아니지만요...
    - 알겠어요. 재미있는 도전인 척할게요...
    thinking_add_media:
    - 물론이죠, 라이브러리에서 검색할게요...
    - 끝없는 목록에 또 하나 — 검색 중...
    - 최소한의 열정으로 찾는 중...
  wizarding:
    thinking_inquiry:
    - 도서관 기록을 확인하는 중...
    - 마법 지도에서 사실을 넘기는 중...
    - 빠른 검색 주문 시전 중...
    thinking_recommend:
    - 금서 구역에서 볼 만한 걸 찾는 중...
    - 기숙 배정 모자에게 취향을 물어보는 중...
    - 추천 물약을 만드는 중 — 거의 다 됐어요...
    thinking_add_media:
    - 금서 구역 카탈로그 검색 중...
    - 도서관 색인 확인 중...
    - 검색 주문 — 거의 다 됐어요...
shared:
  recommend_button:
  - 뭔가 추천해줘
  download_ready:
  - 🎉 *{title}* ({type}) 준비 완료! [▶️ Jellyfin에서 시청]({url})
  download_ready_no_url:
