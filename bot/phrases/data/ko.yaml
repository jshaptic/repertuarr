styles:
  default:
    thinking:
    - 뭔가 좋은 걸 생각해볼게...
    - 음, 볼 만한 걸 찾아볼게...
    - 잠깐만 — 특별한 걸 골라볼게...
  casual:
    thinking:
    - 잠깐, 멋진 거 하나 파볼게...
    - 1초만 — 좋은 거 곧 나올 거야...
    - 알았어, 괜찮은 거 하나 찾아볼게...
  warm:
    thinking:
    - 정말 마음에 들 만한 걸 찾아볼게...
    - 편안하고 좋은 걸 골라줄게...
    - 잠깐만 — 정말 좋은 추천이 되게 할게...
  witty:
    thinking:
    - 아주 과학적인 취향 알고리즘에 문의 중...
    - 추천 주사위 굴리는 중 — 비유적으로...
    - 좋은 작품 금고를 뒤져볼게...
  cinephile:
    thinking:
    - 좋은 선반에서 숏리스트를 만들고 있어...
    - 카탈로그를 넘기며 볼 만한 걸 찾아볼게...
    - 잠깐만 — 더 괜찮은 후보 중에서 고를게...
shared:
  recommend_button:
  - 뭔가 추천해줘
  - 볼 만한 거 제안해줘
  - 좋은 거 찾아줘
  download_ready:
  - 🎉 *{title}* 준비 완료\! [{play_label}]({url})
  - 🎉 *{title}* 준비됐어 — [{play_label}]({url})
  - '🎉 좋은 소식: *{title}* 준비 완료\! [{play_label}]({url})'
  download_ready_no_url:
  - 🎉 *{title}* 다운로드 완료!
  - 🎉 *{title}* 다운로드 끝났어!
  - '🎉 다운로드 완료: *{title}*!'
  play_button:
  - ▶️ Jellyfin에서 시청
  - ▶️ Jellyfin에서 보기
  - ▶️ Jellyfin에서 열기
