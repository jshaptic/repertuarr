styles:
  default:
    thinking_inquiry:
    - Let me look that up...
    - One moment — checking that for you...
    - Searching for an answer...
    thinking_recommend:
    - Let me think of something good...
    - Hmm, let me find something worth your time...
    - One moment — picking something special...
    thinking_add_media:
    - Searching the library for that title...
    - Looking that up in the catalogue...
    - One moment — finding matches...
  casual:
    thinking_inquiry:
    - Hang on, I'll dig into that...
    - Give me a sec — I'll look it up...
    - Okay okay, let me find an answer...
    thinking_recommend:
    - Hang on, I'll dig up something cool...
    - Give me a sec — something good is coming...
    - Okay okay, let me find you a winner...
    thinking_add_media:
    - On it — searching the library...
    - Give me a sec, I'll hunt that title down...
    - Okay okay, let me find it in the catalogue...
  warm:
    thinking_inquiry:
    - Let me find the best answer for you...
    - I'll look that up carefully for you...
    - Give me a moment — I want to get this right...
    thinking_recommend:
    - Let me find something you'll really enjoy...
    - I'll pick something cozy and good for you...
    - Give me a moment — I want this to be a great pick...
    thinking_add_media:
    - Let me search the library for that title...
    - I'll find the right match for your library...
    - Give me a moment — looking that up for you...
  sarcastic:
    thinking_inquiry:
    - Oh sure, let me drop everything and look that up...
    - Because obviously I had nothing better to do...
    - Fine. I'll pretend this is a fascinating question...
    thinking_recommend:
    - Oh sure, let me drop everything and find you something perfect...
    - Because obviously I had nothing better to do...
    - Fine. I'll pretend this is a fascinating challenge...
    - Hold on — I'll sift through the catalogue with minimal enthusiasm...
    - What a surprise, another recommendation request...
    - Give me a sec. Thrilled to help, as always...
    thinking_add_media:
    - Oh sure, let me search the library for that...
    - Another title for your endless watchlist — searching...
    - Fine. I'll look it up with minimal enthusiasm...
  wizarding:
    thinking_inquiry:
    - Consulting the library archives...
    - Flipping through the Marauder's Map of facts...
    - Casting a quick lookup spell...
    thinking_recommend:
    - Checking the Restricted Section for something worth watching...
    - Consulting the Sorting Hat on your taste...
    - Brewing a recommendation potion — almost ready...
    - Flipping through the Marauder's Map of good titles...
    - Waiting for my Hogwarts letter... I mean, browsing the catalogue...
    - Casting a quick recommendation spell...
    thinking_add_media:
    - Searching the Restricted Section catalogue...
    - Consulting the library index for that title...
    - Casting a quick search spell — almost ready...
shared:
  recommend_button:
  - Recommend me something
  welcome:
  - 🎬 Media Bot Online. Use /status to check services, or just ask me to add a movie/show!
  unknown_intent:
  - 🤔 I'm not sure what you want.
  request_error:
  - ❌ Something went wrong processing your request.
  llm_not_configured:
  - ⚠️ LLM not configured. Cannot process request.
  image_download_error:
  - ❌ Could not download the image from Telegram. Please try again.
  inquiry_error:
  - ❌ Error generating response.
  recommend_failed:
  - ❌ Couldn't generate recommendations.
  recommend_error:
  - ❌ Error generating recommendations.
  add_media_no_title:
  - ❓ I understood you want to add media, but I couldn't figure out the title.
  no_radarr:
  - ⚠️ No Radarr instance configured for your account.
  no_sonarr:
  - ⚠️ No Sonarr instance configured for your account.
  ambiguous_media_type:
  - ❓ Ambiguous media type for '{title}'.
  no_search_results:
  - ❌ No results found for '{title}' on {type} DB.
  no_released_media:
  - ❌ No released media found for '**{title}**'.
  arr_error:
  - ❌ Error communicating with {type}.
  carousel_footer:
  - ({idx} of {total})
  inline_add:
  - Add
  inline_added:
  - ✅ Added
  carousel_expired:
  - This carousel has expired.
  unauthorized:
  - Unauthorized
  feedback_watched:
  - ✅ Marked as watched
  feedback_disliked:
  - ✅ Marked as disliked
  feedback_ignored:
  - ✅ Ignored
  adding_to_library:
  - Adding to library...
  add_not_found:
  - '❌ **Error: Item not found during add.**'
  already_in_library:
  - ⚠️ **Already in library!**
  add_failed:
  - ❌ **Failed to add.**
  add_error:
  - ❌ **Error occurred.**
  status_sonarr_online:
  - '✅ Sonarr: Online'
  status_sonarr_error:
  - '⚠️ Sonarr: Error {status_code}'
  status_sonarr_unreachable:
  - '❌ Sonarr: Unreachable ({error})'
  status_sonarr_not_configured:
  - 'ℹ️ Sonarr: Not configured'
  clear_chat:
  - 🧹 Cleared {removed} stored messages. Starting fresh.
  media_type_movie:
  - Movie
  media_type_show:
  - Show
  request_queued:
  - '{type} *{title}* is queued. I''ll let you know when the download starts.'
  download_started:
  - '{type} *{title}* started downloading. I''ll let you know when it''s ready.'
  download_ready:
  - 🎉 {type} *{title}* is ready to watch! [Play on {server}]({url})
  download_ready_no_url:
  - 🎉 {type} *{title}* has been downloaded!
  download_failed:
  - ⚠️ {type} *{title}* was added, but needs manual help before it can finish the download. Please ask your server owner
    for support.
  download_unavailable:
  - ⚠️ {type} *{title}* was added, but no suitable download could be found right now. Please ask your server owner for support.
