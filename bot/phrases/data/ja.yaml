styles:
  default:
    thinking:
    - いいものを考えてみるね...
    - うーん、見る価値のあるものを探してみる...
    - ちょっと待って — 特別なものを選ぶね...
  casual:
    thinking:
    - 待ってて、いいの掘り出してくる...
    - ちょい待ち — いいの見つかるよ...
    - オッケー、いいやつ探してくるね...
  warm:
    thinking:
    - きっと気に入ってもらえるものを探すね...
    - ほっこりしていて良いものを選ぶよ...
    - ちょっと待って — いいおすすめにしたいから...
  witty:
    thinking:
    - 非常に科学的な趣味アルゴリズムに相談中...
    - おすすめサイコロを振ってる — 比喩的に...
    - 良作の金庫を漁ってくるね...
  cinephile:
    thinking:
    - 良い棚からショートリストを作ってる...
    - カタログを眺めてふさわしいものを探す...
    - ちょっと待って — 上質な候補から選ぶね...
  sarcastic:
    thinking:
    - はいはい、全部放り出して完璧なもの探しますよ...
    - もちろん他にやることがなかったわけじゃないですけど...
    - わかった。超面白い課題だと思い込みます...
  wizarding:
    thinking:
    - 禁書区からいいものを探してる...
    - 組分け帽に好みを相談中...
    - おすすめポーションを調合中 — もう少し...
